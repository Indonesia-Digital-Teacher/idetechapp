services:
  app:
    image: ghcr.io/indonesia-digital-teacher/idetechapp:latest
    container_name: idetechapp
    ports:
      - "2016:2016"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 2016
      DATABASE_URL: /app/data/idetech.db
    volumes:
      - sqlite_data:/app/data
    networks:
      - ferileenet
    restart: always
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "const r = await fetch('http://127.0.0.1:2016/api/health'); if (!r.ok) process.exit(1)"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  sqlite_data:

networks:
  ferileenet:
    external: true
